# ===================================================================
# Model Konfigürasyonu — YOLO sınıf haritası
# Mevcut PPE Detection modelinden türetilmiştir.
# ===================================================================

model:
  name: "PPE Detection YOLOv8n"
  weights: "ai/weights/best.pt"
  base_model: "yolov8n"
  framework: "ultralytics"
  epochs_trained: 100

classes:
  count: 10
  names:
    0: "Hardhat"
    1: "Mask"
    2: "NO-Hardhat"
    3: "NO-Mask"
    4: "NO-Safety Vest"
    5: "Person"
    6: "Safety Cone"
    7: "Safety Vest"
    8: "machinery"
    9: "vehicle"

# İhlal sınıfları — KKD eksikliğini temsil eden sınıflar
violation_classes:
  - "NO-Hardhat"
  - "NO-Mask"
  - "NO-Safety Vest"

# Varsayılan eşik değerleri
defaults:
  confidence_threshold: 0.5
  iou_threshold: 0.45
  device: "cpu"  # veya "cuda:0"

# Veri kaynağı bilgisi
dataset:
  name: "Construction Site Safety Image Dataset"
  source: "Roboflow"
  license: "CC BY 4.0"
  url: "https://universe.roboflow.com/roboflow-universe-projects/construction-site-safety/dataset/28"
